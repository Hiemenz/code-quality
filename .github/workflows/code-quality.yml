name: Code Quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Oldest supported (pyproject requires-python >=3.11), a middle
        # release, and the newest stable.
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install codequality + test deps
        run: |
          pip install .
          pip install pytest

      - name: Run test suite
        run: pytest tests/ -q

  code-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so `codequality diff` can find the merge-base

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install codequality
        run: pip install .

      # Score the whole repo. This is the "overall health" number -- track
      # it over time, don't necessarily gate on it (legacy code may be messy).
      - name: Full repo scan
        run: |
          codequality scan . --format json --output codequality-full.json
          codequality scan . --format text

      # Score only what this PR actually changed, against the PR base branch.
      # This is the number to gate merges on: it holds new/changed code to a
      # bar without requiring the whole repo to be cleaned up first.
      - name: Changed-code scan (gate)
        if: github.event_name == 'pull_request'
        run: |
          codequality diff . --base "origin/${{ github.base_ref }}" \
            --format markdown --output codequality-diff.md --fail-under 70
          codequality diff . --base "origin/${{ github.base_ref }}" --format json --output codequality-diff.json

      # Sticky comment: update the previous score comment on re-push instead
      # of stacking a new one per run.
      - name: Post PR comment
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('codequality-diff.md')) return;
            const marker = '<!-- codequality-report -->';
            const body = marker + '\n' + fs.readFileSync('codequality-diff.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find(c => c.body && c.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codequality-reports
          path: codequality-*.json

      # Example only (not wired into this job): a repo that also wants to
      # gate on its own formatter/linter/tests alongside codequality's scan
      # can replace the two steps above with a single `codequality pipeline`
      # call driven by a `[pipeline]` table in .codequality.toml, e.g.:
      #
      #   [[pipeline.steps]]
      #   name = "format-check"
      #   command = "black --check ."
      #
      #   [[pipeline.steps]]
      #   name = "lint"
      #   command = "ruff check ."
      #
      #   [[pipeline.steps]]
      #   name = "test"
      #   command = "pytest -q"
      #
      # - name: Full pipeline (format -> lint -> test -> codequality scan)
      #   run: codequality pipeline . --fail-under 70 --format json --output pipeline.json
      #
      # See "Pipeline" in README.md for the full flag/config reference.
